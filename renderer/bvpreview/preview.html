<style>
  /* hosted preview: the overlay fills the frame and scrolls inside it; the customer's own

  .bv-overlay{ position:fixed !important; inset:0 !important; }
  .bv-bar{ display:none !important; }
  /* doc mode: the document overlay fills the frame; closing it would leave a blank frame */
  .acct-modal-close{ display:none !important; }
